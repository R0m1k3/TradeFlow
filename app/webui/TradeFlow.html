<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradeFlow — Analyse automatique du marché</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235AFF8C'/><path d='M8 22 14 14 19 18 25 10' stroke='%23042a14' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #5AFF8C;
  --accent-2: #1FD968;
  --accent-soft: rgba(90, 255, 140, 0.14);
  --accent-ring: rgba(90, 255, 140, 0.40);
  --accent-glow: 0 8px 28px rgba(48, 220, 110, 0.45), 0 2px 8px rgba(31, 217, 104, 0.35);
  --up: #2FD66B;
  --down: #FF4D5E;
  --up-hex: #2FD66B;
  --down-hex: #FF4D5E;
  --up-soft: rgba(48, 209, 88, 0.16);
  --down-soft: rgba(255, 69, 58, 0.14);

  /* Light glossy */
  --bg: #f1f2f6;
  --bg-grad: radial-gradient(ellipse 80% 60% at 50% -10%, #ffffff 0%, #eef0f5 45%, #e6e9f0 100%);
  --bg-elev: #ffffff;
  --bg-elev-grad: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(252,252,254,1) 100%);
  --bg-tint: #f4f4f6;
  --fg: #0a0a0a;
  --fg-2: #3a3a3a;
  --fg-3: #6e6e73;
  --fg-4: #9a9a9e;
  --hairline: rgba(0, 0, 0, 0.06);
  --hairline-strong: rgba(0, 0, 0, 0.12);
  --row-hover: rgba(0, 0, 0, 0.025);
  --chip-bg: rgba(0, 0, 0, 0.04);
  --chip-grad: linear-gradient(180deg, rgba(0,0,0,0.025), rgba(0,0,0,0.06));
  --gloss-top: rgba(255, 255, 255, 0.9);
  --gloss-edge: rgba(255, 255, 255, 0.6);
  --shadow-sm: 0 1px 2px rgba(15, 20, 40, 0.06);
  --shadow-md:
    0 1px 0 rgba(255, 255, 255, 0.95) inset,
    0 0 0 0.5px rgba(0, 0, 0, 0.04),
    0 1px 3px rgba(15, 20, 40, 0.04),
    0 8px 24px rgba(15, 20, 40, 0.06);
  --shadow-lg:
    0 1px 0 rgba(255, 255, 255, 0.95) inset,
    0 24px 60px rgba(15, 20, 40, 0.12),
    0 8px 24px rgba(15, 20, 40, 0.06);
  --glass: rgba(255, 255, 255, 0.65);
  --glass-grad: linear-gradient(180deg, rgba(255,255,255,0.78) 0%, rgba(255,255,255,0.55) 100%);
  --glass-border: rgba(0, 0, 0, 0.05);
}

[data-theme="dark"] {
  --bg: #16181c;
  --bg-grad:
    radial-gradient(ellipse 70% 50% at 80% 0%, rgba(48, 220, 110, 0.10) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 10% 100%, rgba(31, 217, 104, 0.06) 0%, transparent 60%),
    linear-gradient(180deg, #1a1d22 0%, #14171b 100%);
  --bg-elev: #1f2228;
  --bg-elev-grad: linear-gradient(180deg, rgba(36,40,46,0.95) 0%, rgba(28,31,36,0.95) 100%);
  --bg-tint: #23272d;
  --fg: #f5f5f7;
  --fg-2: #d8d8dc;
  --fg-3: #98989d;
  --fg-4: #6b6b70;
  --hairline: rgba(255, 255, 255, 0.06);
  --hairline-strong: rgba(255, 255, 255, 0.12);
  --row-hover: rgba(90, 255, 140, 0.04);
  --chip-bg: rgba(255, 255, 255, 0.05);
  --chip-grad: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  --gloss-top: rgba(255, 255, 255, 0.08);
  --gloss-edge: rgba(255, 255, 255, 0.05);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
  --shadow-md:
    0 1px 0 rgba(255, 255, 255, 0.05) inset,
    0 0 0 0.5px rgba(255, 255, 255, 0.03),
    0 4px 12px rgba(0, 0, 0, 0.5),
    0 16px 40px rgba(0, 0, 0, 0.6);
  --shadow-lg:
    0 1px 0 rgba(255, 255, 255, 0.06) inset,
    0 24px 70px rgba(0, 0, 0, 0.75),
    0 8px 24px rgba(0, 0, 0, 0.55);
  --glass: rgba(10, 11, 12, 0.6);
  --glass-grad: linear-gradient(180deg, rgba(20,22,24,0.7) 0%, rgba(8,9,10,0.55) 100%);
  --glass-border: rgba(255, 255, 255, 0.06);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  background-image: var(--bg-grad);
  background-attachment: fixed;
  color: var(--fg);
  font-family: 'Inter', 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 14px;
  line-height: 1.45;
  letter-spacing: -0.005em;
  transition: background 0.3s ease, color 0.3s ease;
  min-height: 100vh;
}
.display, h1, h2, h3, .detail-title, .detail-price, .section-title, .idx-val, .stat-val {
  font-family: 'Inter Tight', 'Inter', sans-serif !important;
}
.tnum {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}
.eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
  font-weight: 500;
}

/* App shell */
.app {
  max-width: 1240px;
  margin: 0 auto;
  padding: 16px 32px 80px;
}

/* Top nav — floating pill */
.nav {
  position: sticky;
  top: 12px;
  z-index: 40;
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  background: var(--glass-grad), var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 18px;
  margin: 0 0 28px;
  padding: 10px 12px 10px 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 0.5px rgba(0, 0, 0, 0.02),
    0 12px 40px rgba(15, 20, 40, 0.08);
}
.nav::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(180deg, var(--gloss-edge) 0%, transparent 40%);
  pointer-events: none;
  opacity: 0.6;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.02em;
  color: var(--fg);
  cursor: pointer;
  position: relative;
}
.logo-mark {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 50%),
    linear-gradient(135deg, #7BFFA8 0%, var(--accent) 35%, var(--accent-2) 100%);
  position: relative;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.45) inset,
    0 0 0 0.5px rgba(255,255,255,0.2) inset,
    0 4px 14px rgba(48, 220, 110, 0.55),
    0 1px 3px rgba(31, 217, 104, 0.35);
}
.logo-mark::after {
  content: '';
  position: absolute;
  inset: 7px;
  border-left: 1.5px solid #042a14;
  border-bottom: 1.5px solid #042a14;
  border-radius: 0 0 0 2px;
  opacity: 0.9;
}
.nav-links {
  display: flex;
  gap: 2px;
  margin-left: 8px;
}
.nav-link {
  font-size: 13px;
  color: var(--fg-3);
  padding: 6px 12px;
  border-radius: 7px;
  cursor: pointer;
  font-weight: 450;
  transition: all 0.15s ease;
  position: relative;
}
.nav-link:hover { color: var(--fg); background: var(--chip-grad), var(--chip-bg); }
.nav-link.active {
  color: var(--fg);
  background: var(--chip-grad), var(--chip-bg);
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 0.5px var(--hairline);
}
.nav-spacer { flex: 1; }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px 5px 10px;
  font-size: 11.5px;
  color: var(--fg-2);
  background: var(--chip-grad), var(--chip-bg);
  border-radius: 999px;
  font-weight: 450;
  box-shadow: 0 1px 0 var(--gloss-top) inset, 0 0 0 0.5px var(--hairline);
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft), 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px var(--accent-soft), 0 0 8px var(--accent); }
  50% { box-shadow: 0 0 0 5px var(--accent-soft), 0 0 12px var(--accent); }
}

.icon-btn {
  appearance: none;
  background: var(--chip-grad), var(--chip-bg);
  border: 0.5px solid var(--hairline);
  color: var(--fg-2);
  width: 32px;
  height: 32px;
  border-radius: 9px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 1px 0 var(--gloss-top) inset;
  position: relative;
}
.icon-btn:hover { color: var(--fg); transform: translateY(-0.5px); box-shadow: 0 1px 0 var(--gloss-top) inset, var(--shadow-sm); }

/* Indices cards */
.indices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.idx {
  background: var(--bg-elev-grad), var(--bg-elev);
  border: 0.5px solid var(--hairline);
  border-radius: 16px;
  padding: 18px 20px 16px;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease, border-color 0.2s;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 0.5px rgba(0, 0, 0, 0.02),
    0 1px 2px rgba(15, 20, 40, 0.04),
    0 8px 24px rgba(15, 20, 40, 0.05);
}
.idx::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: linear-gradient(180deg, var(--gloss-edge) 0%, transparent 35%);
  pointer-events: none;
  opacity: 0.5;
}
.idx:hover {
  transform: translateY(-2px);
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 0.5px rgba(0, 0, 0, 0.03),
    0 4px 8px rgba(15, 20, 40, 0.06),
    0 16px 40px rgba(15, 20, 40, 0.10);
  border-color: var(--hairline-strong);
}
.idx.open::before {
  content: '';
  position: absolute;
  top: 0; left: 16px; right: 16px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.95;
  z-index: 1;
  box-shadow: 0 0 8px var(--accent);
}
.idx-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.idx-exch {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-4);
  font-weight: 500;
}
.idx-name {
  font-size: 13px;
  color: var(--fg);
  font-weight: 500;
  margin-top: 1px;
}
.idx-val {
  font-family: 'Inter Tight', sans-serif;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.03em;
  color: var(--fg);
  font-variant-numeric: tabular-nums;
  margin: 2px 0 6px;
}
.idx-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.idx-chg {
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.idx-chg.up { color: var(--accent); }
.idx-chg.down { color: var(--down); }
.idx-state {
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-4);
  font-weight: 500;
}
.idx-state.active { color: var(--accent); }

/* Section header */
.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin: 8px 0 20px;
  padding-top: 28px;
  border-top: 0.5px solid var(--hairline);
}
.section-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.025em;
  margin: 0;
}
.section-sub {
  font-size: 13px;
  color: var(--fg-3);
  margin-top: 4px;
}

/* Search */
.search {
  position: relative;
  margin-bottom: 20px;
}
.search input {
  width: 100%;
  background: var(--bg-elev-grad), var(--bg-elev);
  border: 0.5px solid var(--hairline);
  border-radius: 12px;
  padding: 13px 16px 13px 42px;
  font-size: 14px;
  color: var(--fg);
  font-family: inherit;
  transition: all 0.18s;
  outline: none;
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 1px 2px rgba(15, 20, 40, 0.04);
}
.search input:focus {
  border-color: var(--accent-ring);
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 4px var(--accent-soft);
}
.search input::placeholder { color: var(--fg-4); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg-4);
  pointer-events: none;
}

/* Table wrapped in glossy card */
.tbl-wrap {
  background: var(--bg-elev-grad), var(--bg-elev);
  border: 0.5px solid var(--hairline);
  border-radius: 16px;
  padding: 4px 14px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 0.5px rgba(0, 0, 0, 0.02),
    0 8px 30px rgba(15, 20, 40, 0.06);
}
.tbl-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: linear-gradient(180deg, var(--gloss-edge) 0%, transparent 30%);
  pointer-events: none;
  opacity: 0.4;
}
.tbl-wrap > * { position: relative; }
.tbl {
  width: 100%;
  border-collapse: collapse;
}
.tbl thead th {
  text-align: left;
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-4);
  font-weight: 500;
  padding: 10px 12px;
  border-bottom: 0.5px solid var(--hairline);
  cursor: pointer;
  user-select: none;
}
.tbl thead th:hover { color: var(--fg-2); }
.tbl tbody tr {
  border-bottom: 0.5px solid var(--hairline);
  transition: background 0.12s;
  cursor: pointer;
}
.tbl tbody tr:hover { background: var(--row-hover); }
.tbl tbody td {
  padding: var(--row-pad, 14px) 12px;
  font-size: 13.5px;
  vertical-align: middle;
  transition: padding 0.2s;
}
[data-density="compact"] { --row-pad: 10px; }
[data-density="comfy"] { --row-pad: 16px; }

.sym {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sym-mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--chip-grad), var(--chip-bg);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--fg-2);
  letter-spacing: 0;
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 0 0 0.5px var(--hairline);
}
.company {
  color: var(--fg-3);
  font-size: 13px;
}
.price {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--fg);
}
.chg {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.chg.up { color: var(--accent); }
.chg.down { color: var(--down); }

.spark-cell {
  width: 120px;
  height: 32px;
  position: relative;
}

/* Score */
.score {
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.score-num {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--fg);
  min-width: 28px;
}
.score-bar {
  width: 56px;
  height: 4px;
  background: var(--chip-bg);
  border-radius: 2px;
  overflow: hidden;
}
.score-fill {
  height: 100%;
  background: var(--fg-3);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.score.strong .score-fill {
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  box-shadow: 0 0 8px rgba(90, 255, 140, 0.5);
}

/* Signal badge + hover actions */
.signal-cell {
  text-align: right;
  position: relative;
  min-width: 180px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  font-weight: 500;
  padding: 4px 11px 4px 9px;
  border-radius: 999px;
  background: var(--chip-grad), var(--chip-bg);
  color: var(--fg-3);
  letter-spacing: -0.005em;
  box-shadow: 0 1px 0 var(--gloss-top) inset, 0 0 0 0.5px var(--hairline);
}
.badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 6px currentColor;
}
.badge.buy { color: #7BFFA8; background: linear-gradient(180deg, rgba(90,255,140,0.22), rgba(48,220,110,0.10)); box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 0.5px rgba(90,255,140,0.30), 0 0 12px rgba(90,255,140,0.15); }
.badge.sell { color: #FF7A86; background: linear-gradient(180deg, rgba(255,77,94,0.20), rgba(255,77,94,0.08)); box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 0.5px rgba(255,77,94,0.28); }
.badge.watch { color: var(--fg-2); background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)); box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 0.5px var(--hairline); }

.row-actions {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%) translateX(4px);
  display: flex;
  gap: 6px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.18s ease;
}
.tbl tbody tr:hover .row-actions {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
  pointer-events: auto;
}
.tbl tbody tr:hover .signal-static { opacity: 0; }
.signal-static { transition: opacity 0.15s; }

.btn {
  appearance: none;
  border: 0.5px solid var(--hairline);
  background: var(--bg-elev-grad), var(--bg-elev);
  color: var(--fg);
  padding: 7px 13px;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s cubic-bezier(.2,.8,.2,1);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  box-shadow:
    0 1px 0 var(--gloss-top) inset,
    0 1px 2px rgba(15, 20, 40, 0.05);
}
.btn:hover { transform: translateY(-0.5px); border-color: var(--hairline-strong); box-shadow: 0 1px 0 var(--gloss-top) inset, 0 4px 10px rgba(15, 20, 40, 0.08); }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(180deg, #2a2a2e, #0a0a0a);
  color: #fff;
  border-color: rgba(0,0,0,0.5);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.15) inset,
    0 0 0 0.5px rgba(0,0,0,0.6),
    0 4px 10px rgba(0,0,0,0.25);
}
[data-theme="dark"] .btn.primary {
  background: linear-gradient(180deg, #f5f5f7, #d8d8dc);
  color: #0a0a0a;
  border-color: rgba(255,255,255,0.3);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 4px 10px rgba(0,0,0,0.4);
}
.btn.primary:hover { filter: brightness(1.08); }
.btn.accent {
  background: linear-gradient(180deg, #7BFFA8 0%, var(--accent) 50%, var(--accent-2) 100%);
  color: #042a14;
  border-color: rgba(31, 217, 104, 0.6);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 0 0 0.5px rgba(31, 217, 104, 0.3),
    0 4px 14px rgba(48, 220, 110, 0.45),
    0 1px 3px rgba(31, 217, 104, 0.35);
  text-shadow: 0 1px 0 rgba(255,255,255,0.2);
  font-weight: 600;
}
.btn.accent:hover {

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ═══════════════════════════════════════════════════════════════
// CONSTANTS — hex colors for SVG (CSS vars don't resolve in stopColor)
// ═══════════════════════════════════════════════════════════════
const COLOR_UP   = '#2FD66B';
const COLOR_DOWN = '#FF4D5E';

// ═══════════════════════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════════════════════

const API_BASE = window.location.origin;

async function apiFetch(path, options = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    ...options,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function fmt(n, d = 2) {
  if (n == null) return '—';
  return n.toLocaleString('fr-FR', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function signalLabel(s) {
  return { buy: 'Acheter', sell: 'Vendre', watch: 'Attendre' }[s] || s;
}

// ═══════════════════════════════════════════════════════════════
// HOOKS
// ═══════════════════════════════════════════════════════════════

function useLivePrices(symbols) {
  const [prices, setPrices] = useState({});
  useEffect(() => {
    if (!symbols || symbols.length === 0) return;
    const url = `/api/prices/stream?symbols=${symbols.join(',')}`;
    const es = new EventSource(url);
    es.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.symbol && d.price != null) {
          setPrices(prev => ({ ...prev, [d.symbol]: d }));
        }
      } catch {}
    };
    es.onerror = () => es.close();
    return () => es.close();
  }, [symbols.join(',')]); // eslint-disable-line
  return prices;
}

// ═══════════════════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════════════════

function Icon({ name, size = 16, stroke = 1.5 }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'search': return <svg {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>;
    case 'settings': return <svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    case 'arrow-left': return <svg {...p}><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>;
    case 'arrow-up-right': return <svg {...p}><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>;
    case 'up': return <svg {...p} strokeWidth="2"><path d="m5 15 7-7 7 7"/></svg>;
    case 'down': return <svg {...p} strokeWidth="2"><path d="m5 9 7 7 7-7"/></svg>;
    case 'sun': return <svg {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>;
    case 'moon': return <svg {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
    case 'play': return <svg {...p} fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>;
    case 'chart': return <svg {...p}><path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/></svg>;
    case 'bot': return <svg {...p}><rect x="4" y="8" width="16" height="12" rx="3"/><path d="M12 4v4M8 14h.01M16 14h.01"/></svg>;
    case 'stop': return <svg {...p}><rect x="6" y="6" width="12" height="12" rx="2"/></svg>;
    default: return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// SPARKLINE — hex colors passed directly (CSS vars fail in SVG stopColor)
// ═══════════════════════════════════════════════════════════════

function Sparkline({ data, color, width = 120, height = 32, fill = false, strokeWidth = 1.25 }) {
  const { path, area, lastY } = useMemo(() => {
    if (!data || !data.length) return { path: '', area: '', lastY: 0 };
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;
    const stepX = width / (data.length - 1);
    const pts = data.map((v, i) => {
      const x = i * stepX;
      const y = height - ((v - min) / range) * (height - 4) - 2;
      return [x, y];
    });
    const path = pts.map(([x, y], i) => (i === 0 ? `M${x},${y}` : `L${x},${y}`)).join(' ');
    // Fade area stops before the bottom edge to avoid dark wedge artifact
    const fadeEnd = Math.min(height, Math.max(...pts.map(p => p[1])) + (height * 0.35));
    const area = `${path} L${width},${fadeEnd} L0,${fadeEnd} Z`;
    return { path, area, lastY: pts[pts.length - 1][1] };
  }, [data, width, height]);

  const gradId = `spark-${Math.abs((data?.[0] ?? 0) * 1000 | 0)}-${(color ?? '').replace('#', '')}`;
  return (
    <svg width={width} height={height} style={{ display: 'block', overflow: 'visible' }}>
      {fill && (
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0"   stopColor={color} stopOpacity="0.28"/>
            <stop offset="0.6" stopColor={color} stopOpacity="0.08"/>
            <stop offset="1"   stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
      )}
      {fill && <path d={area} fill={`url(#${gradId})`} />}
      <path d={path} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"/>
      {data?.length > 0 && <circle cx={width} cy={lastY} r="2" fill={color} />}
    </svg>
  );
}

// ═══════════════════════════════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════════════════════════════

function ThemeToggle({ theme, setTheme }) {
  return (
    <button className="icon-btn" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Thème" aria-label="Changer de thème">
      <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={15} />
    </button>
  );
}

// ═══════════════════════════════════════════════════════════════
// RISK PANEL (v2)
// ═══════════════════════════════════════════════════════════════

function RiskPanel() {
  const [regime, setRegime] = useState(null);
  const [risk, setRisk] = useState(null);
  const [busy, setBusy] = useState(false);

  const load = useCallback(async () => {
    try {
      const [r, k] = await Promise.all([
        apiFetch('/api/v2/regime?benchmark=SPY').catch(() => null),
        apiFetch('/api/v2/risk/status').catch(() => null),
      ]);
      setRegime(r);
      setRisk(k);
    } catch {}
  }, []);

  useEffect(() => { load(); const t = setInterval(load, 30000); return () => clearInterval(t); }, [load]);

  const toggleKillSwitch = async () => {
    if (!risk) return;
    setBusy(true);
    try {
      const active = risk.kill_switch_active;
      await apiFetch('/api/v2/risk/kill-switch', { method: active ? 'DELETE' : 'POST' });
      await load();
    } catch (e) { console.error(e); }
    setBusy(false);
  };

  if (!regime && !risk) return null;

  const regimeColor = !regime ? 'var(--fg-4)'
    : regime.regime === 'bull_calm' ? COLOR_UP
    : regime.regime === 'bull_vol' ? '#FFB020'
    : COLOR_DOWN;

  const regimeLabel = !regime ? '—'
    : regime.regime === 'bull_calm' ? 'Bullish calme'
    : regime.regime === 'bull_vol' ? 'Bullish volatil'
    : 'Bearish';

  const breaker = risk?.circuit_breaker;
  const halted = breaker?.halted || risk?.kill_switch_active;

  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: 'repeat(4, 1fr)',
      gap: 12,
      marginBottom: 20,
      padding: '14px 18px',
      background: 'var(--bg-elev-grad), var(--bg-elev)',
      border: '0.5px solid var(--hairline)',
      borderRadius: 14,
      borderLeft: `3px solid ${halted ? COLOR_DOWN : regimeColor}`,
      boxShadow: '0 1px 0 var(--gloss-top) inset, 0 4px 14px rgba(15,20,40,0.05)',
    }}>
      <div>
        <div className="eyebrow">Régime de marché</div>
        <div style={{ fontSize: 14, fontWeight: 500, color: regimeColor, marginTop: 4 }}>
          {regimeLabel}
        </div>
        {regime && (
          <div style={{ fontSize: 11, color: 'var(--fg-4)', marginTop: 2 }}>
            Vol {(regime.realized_vol_annual * 100).toFixed(1)}% · pct {(regime.vol_percentile * 100).toFixed(0)}
          </div>
        )}
      </div>
      <div>
        <div className="eyebrow">Exposition autorisée</div>
        <div style={{ fontSize: 14, fontWeight: 500, marginTop: 4 }}>
          {regime ? `${(regime.exposure_multiplier * 100).toFixed(0)}%` : '—'}
        </div>
        <div style={{ fontSize: 11, color: 'var(--fg-4)', marginTop: 2 }}>du sizing nominal</div>
      </div>
      <div>
        <div className="eyebrow">Circuit Breaker</div>
        <div style={{ fontSize: 14, fontWeight: 500, color: halted ? COLOR_DOWN : COLOR_UP, marginTop: 4 }}>
          {halted ? '🛑 HALTED' : '✓ Actif'}
        </div>
        <div style={{ fontSize: 11, color: 'var(--fg-4)', marginTop: 2 }}>
          {breaker?.tripped_level || 'aucun déclenchement'}
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <button
          className="btn"
          disabled={busy}
          onClick={toggleKillSwitch}
          style={{
            background: risk?.kill_switch_active ? COLOR_DOWN : 'transparent',
            color: risk?.kill_switch_active ? 'white' : COLOR_DOWN,
            border: `1px solid ${COLOR_DOWN}`,
            fontWeight: 500,
          }}
        >
          {risk?.kill_switch_active ? 'Réactiver bot' : '🛑 Kill Switch'}
        </button>
      </div>
    </div>
  );
}

function StatusPill({ open }) {
  return (
    <span className="status-pill">
      <span className="status-dot" style={{
        background: open ? COLOR_UP : 'var(--fg-4)',
        boxShadow: open ? `0 0 0 3px var(--up-soft), 0 0 8px ${COLOR_UP}` : 'none',
        animation: open ? 'pulse 2s ease-in-out infinite' : 'none'
      }} />
      {open ? 'Marchés ouverts' : 'Hors session'}
    </span>
  );
}

// HOME SCREEN
// ═══════════════════════════════════════════════════════════════

function HomeScreen({ onOpenStock, onOpenConfig, botActive, setBotActive }) {
  const [query, setQuery] = useState('');
  const [sort, setSort] = useState({ key: 'score', dir: 'desc' });
  const [markets, setMarkets] = useState(null);
  const [stocks, setStocks] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const symbols = useMemo(() => (stocks || []).map(s => s.sym), [stocks]);
  const livePrices = useLivePrices(symbols);

  const loadData = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const [m, s] = await Promise.all([
        apiFetch('/api/markets'),
        apiFetch('/api/stocks?limit=200'),
      ]);
      setMarkets(m);
      setStocks(s.stocks);
    } catch (e) {
      setError(e.message || 'Erreur de chargement');
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);
  useEffect(() => { const t = setInterval(loadData, 60000); return () => clearInterval(t); }, [loadData]);
  useEffect(() => {
    if (!botActive) return;
    const t = setTimeout(loadData, 2000);
    return () => clearTimeout(t);
  }, [botActive, loadData]);

  const filtered = useMemo(() => {
    if (!stocks) return [];
    const q = query.trim().toLowerCase();
    let list = stocks.filter(s =>
      !q || s.sym.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)
    );
    list = [...list].sort((a, b) => {
      const va = a[sort.key], vb = b[sort.key];
      if (typeof va === 'string') return sort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return sort.dir === 'asc' ? va - vb : vb - va;
    });
    return list;
  }, [query, sort, stocks]);

  const toggleSort = (key) => {
    setSort(s => s.key === key ? { key, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'desc' });
  };
  const sortArrow = (key) => sort.key === key ? (sort.dir === 'asc' ? ' ↑' : ' ↓') : '';

  const indices = markets?.exchanges || [];
  const anyOpen = indices.some(i => i.open);

  const handleBotToggle = async () => {
    try {
      if (botActive) {
        await apiFetch('/api/bot/stop', { method: 'POST' });
        setBotActive(false);
      } else {
        await apiFetch('/api/bot/start', { method: 'POST' });
        setBotActive(true);
      }
    } catch (e) { alert('Erreur: ' + e.message); }
  };

  if (loading && !stocks) {
    return (
      <>
        <div className="indices">
          {[1,2,3,4].map(i => (
            <div key={i} className="idx">
              <div className="shimmer" style={{ width: '60%', height: 12, marginBottom: 12 }} />
              <div className="shimmer" style={{ width: '40%', height: 24, marginBottom: 10 }} />
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <div className="shimmer" style={{ width: '30%', height: 14 }} />
                <div className="shimmer" style={{ width: '20%', height: 14 }} />
              </div>
            </div>
          ))}
        </div>
        <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--fg-3)' }}>
          Chargement des données…
        </div>
      </>
    );
  }

  if (error) {
    return (
      <div className="empty-state">
        <h3>Erreur de connexion</h3>
        <p>{error}</p>
        <button className="btn accent" onClick={loadData} style={{ marginTop: 16 }}>Réessayer</button>
      </div>
    );
  }

  return (
    <>
      {/* Indices */}
      <div className="indices">
        {indices.length > 0 ? indices.map(idx => (
          <div key={idx.name} className={`idx ${idx.open ? 'open' : ''}`}>
            <div className="idx-head">
              <div>
                <div className="idx-exch">{idx.exch}</div>
                <div className="idx-name">{idx.name}</div>
              </div>
            </div>
            <div className="idx-val tnum">{idx.val != null ? fmt(idx.val) : '…'}</div>
            <div className="idx-foot">
              <span className={`idx-chg ${idx.chg != null && idx.chg >= 0 ? 'up' : 'down'}`}>
                {idx.chg != null ? (
                  <><Icon name={idx.chg >= 0 ? 'up' : 'down'} size={11} />
                  {idx.chg >= 0 ? '+' : ''}{fmt(idx.chg)}%</>
                ) : '…'}
              </span>
              <span className={`idx-state ${idx.open ? 'active' : ''}`}>
                {idx.open ? 'Ouvert' : 'Fermé'}
              </span>
            </div>
          </div>
        )) : (
          [1,2,3,4].map(i => (
            <div key={i} className="idx">
              <div className="shimmer" style={{ width: '60%', height: 12, marginBottom: 12 }} />
              <div className="shimmer" style={{ width: '40%', height: 24, marginBottom: 10 }} />
            </div>
          ))
        )}
      </div>

      <p className="market-note">
        <StatusPill open={anyOpen} />
        <span style={{ color: 'var(--fg-4)' }}>·</span>
        <span>Le bot peut trader pendant les sessions actives</span>
      </p>

      <RiskPanel />

      {/* Section header */}
      <div className="section-head">
        <div>
          <h2 className="section-title">Analyse en direct</h2>
          <div className="section-sub">Aperçu des scores · {filtered.length} actions suivies</div>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button className="btn ghost" onClick={onOpenConfig}>
            <Icon name="settings" size={14} />
            Configurer le bot
          </button>
          <button className={`btn ${botActive ? 'primary' : 'accent'}`} onClick={handleBotToggle}>
            <Icon name={botActive ? 'bot' : 'play'} size={13} />
            {botActive ? 'Bot actif' : 'Démarrer le bot'}
          </button>
        </div>
      </div>

      {/* Search */}
      <div className="search">
        <span className="search-icon"><Icon name="search" size={16} /></span>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="Rechercher une action — ex : Apple, NVDA, LVMH…"
        />
      </div>

      {/* Table */}
      {filtered.length === 0 ? (
        <div className="empty-state">
          <h3>{query ? 'Aucune action trouvée' : 'Chargement…'}</h3>
          <p>{query ? 'Essaie de modifier ta recherche' : 'Les données arrivent dans un instant'}</p>
        </div>
      ) : (
      <div className="tbl-wrap">
        <table className="tbl">
          <thead>
            <tr>
              <th style={{ width: '18%' }} onClick={() => toggleSort('sym')}>Symbole{sortArrow('sym')}</th>
              <th style={{ width: '24%' }} onClick={() => toggleSort('name')}>Société{sortArrow('name')}</th>
              <th style={{ width: '12%' }} onClick={() => toggleSort('price')}>Prix{sortArrow('price')}</th>
              <th style={{ width: '12%' }} onClick={() => toggleSort('chg')}>Variation{sortArrow('chg')}</th>
              <th style={{ width: '14%' }}>Tendance 24h</th>
              <th style={{ width: '10%' }} onClick={() => toggleSort('score')}>Score{sortArrow('score')}</th>
              <th style={{ width: '10%', textAlign: 'right' }}>Signal</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(s => {
              const live = livePrices[s.sym];
              const livePrice = live ? live.price : s.price;
              const isUp = s.chg >= 0;
              const liveIsUp = live ? livePrice >= s.price : isUp;
              const sparkData = s.sparkline || [];
              const sparkTrend = sparkData.length >= 2
                ? sparkData[sparkData.length - 1] >= sparkData[0]
                : isUp;
              const color = sparkTrend ? COLOR_UP : COLOR_DOWN;
              const currency = s.currency || 'USD';
              const prefix = currency === 'EUR' ? '' : '$';
              const suffix = currency === 'EUR' ? ' €' : '';
              const chgPrefix = isUp ? '+' : '';
              return (
                <tr key={s.sym} onClick={() => onOpenStock(s)}>
                  <td>
                    <div className="sym">
                      <span className="sym-mark">{s.sym.slice(0, 2)}</span>
                      {s.sym}
                    </div>
                  </td>
                  <td className="company">{s.name}{s.sym !== s.name ? ` (${s.sym})` : ''}</td>
                  <td className="price tnum" style={{ color: live ? (liveIsUp ? COLOR_UP : COLOR_DOWN) : 'inherit', transition: 'color 0.4s' }}>
                    {prefix}{fmt(livePrice)}{suffix}
                  </td>
                  <td>
                    <span className={`chg ${isUp ? 'up' : 'down'}`}>
                      <Icon name={isUp ? 'up' : 'down'} size={10} />
                      {chgPrefix}{fmt(s.chg)}%
                    </span>
                  </td>
                  <td>
                    <div className="spark-cell">
                      {sparkData.length > 0 ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <Sparkline data={sparkData} color={color} width={80} height={30} fill />
                          <span style={{ fontSize: 10, fontWeight: 500, color, whiteSpace: 'nowrap' }}>
                            {sparkTrend ? '↑' : '↓'} {chgPrefix}{fmt(s.chg)}%
                          </span>
                        </div>
                      ) : (
                        <span style={{ color: 'var(--fg-4)', fontSize: 11 }}>—</span>
                      )}
                    </div>
                  </td>
                  <td>
                    <span className={`score ${s.score >= 0.6 ? 'strong' : ''}`}>
                      <span className="score-num tnum">{s.score.toFixed(2)}</span>
                      <span className="score-bar"><span className="score-fill" style={{ width: `${Math.min(s.score * 100, 100)}%` }} /></span>
                    </span>
                  </td>
                  <td className="signal-cell">
                    <span className={`badge ${s.signal} signal-static`}>{signalLabel(s.signal)}</span>
                    <span className="row-actions">
                      <button className="btn" onClick={e => { e.stopPropagation(); onOpenStock(s); }}>
                        Détail <Icon name="arrow-up-right" size={11} />
                      </button>
                      <button className={`btn ${s.signal === 'buy' ? 'accent' : ''}`} onClick={e => e.stopPropagation()}>
                        {s.signal === 'buy' ? 'Trader' : s.signal === 'sell' ? 'Vendre' : 'Surveiller'}
                      </button>
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      )}
    </>
  );
}

function DetailScreen({ stock, onBack }) {
  const [range, setRange] = useState('1M');
  const [detail, setDetail] = useState(null);
  const [chartData, setChartData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const ranges = ['1J', '1S', '1M', '3M', '1A', 'TOUT'];
  const sym = stock.sym || stock;

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    Promise.all([
      apiFetch(`/api/stocks/${encodeURIComponent(sym)}`),
      apiFetch(`/api/stocks/${encodeURIComponent(sym)}/history?range=1M`),
    ])
      .then(([d, h]) => {
        if (cancelled) return;
        setDetail(d);
        setChartData(h.prices);
      })
      .catch(e => { if (!cancelled) setError(e.message); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [sym]);

  useEffect(() => {
    let cancelled = false;
    apiFetch(`/api/stocks/${encodeURIComponent(sym)}/history?range=${range}`)
      .then(h => { if (!cancelled) setChartData(h.prices); })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [sym, range]);

  if (loading) {
    return (
      <>
        <div className="back-btn" onClick={onBack}>
          <Icon name="arrow-left" size={16} /> Retour à l'analyse
        </div>
        <div style={{ padding: '40px 0' }}>
          <div className="shimmer" style={{ width: '40%', height: 32, marginBottom: 12 }} />
          <div className="shimmer" style={{ width: '60%', height: 48, marginBottom: 20 }} />
          <div className="shimmer" style={{ width: '100%', height: 320, borderRadius: 18, marginBottom: 20 }} />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
            {[1,2,3,4,5,6,7,8].map(i => (
              <div key={i} className="shimmer" style={{ height: 72, borderRadius: 14 }} />
            ))}
          </div>
        </div>
      </>
    );
  }

  if (error) {
    return (
      <>
        <div className="back-btn" onClick={onBack}>
          <Icon name="arrow-left" size={16} /> Retour à l'analyse
        </div>
        <div className="empty-state">
          <h3>Erreur de chargement</h3>
          <p>{error}</p>
        </div>
      </>
    );
  }

  const d = detail || stock;
  const isUp = d.chg >= 0;
  const color = isUp ? COLOR_UP : COLOR_DOWN;
  const currency = d.currency || 'USD';
  const prefix = currency === 'EUR' ? '' : '$';
  const suffix = currency === 'EUR' ? ' €' : '';

  const statsData = d.stats ? [
    { label: 'Ouverture', val: `${prefix}${fmt(d.stats.open)}${suffix}` },
    { label: 'Haut 52 sem.', val: `${prefix}${fmt(d.stats.high_52w)}${suffix}` },
    { label: 'Bas 52 sem.', val: `${prefix}${fmt(d.stats.low_52w)}${suffix}` },
    { label: 'Volume', val: fmt(d.stats.volume / 1e6, 1) + 'M' },
    { label: 'Volume moy. (30j)', val: fmt(d.stats.avg_volume_30d / 1e6, 1) + 'M' },
    { label: 'RSI (14)', val: d.stats.rsi != null ? d.stats.rsi : '—' },
    { label: 'Score IA', val: d.score.toFixed(2) },
    { label: 'Confiance', val: `${Math.round(d.score * 100)}%` },
  ] : [
    { label: 'Prix', val: `${prefix}${fmt(d.price)}${suffix}` },
    { label: 'Variation', val: `${isUp ? '+' : ''}${fmt(d.chg)}%` },
    { label: 'Score IA', val: d.score.toFixed(2) },
    { label: 'Signal', val: signalLabel(d.signal) },
  ];

  return (
    <>
      <div className="back-btn" onClick={onBack}>
        <Icon name="arrow-left" size={16} />
        Retour à l'analyse
      </div>

      <div className="detail-head">
        <div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>{d.sym} · {d.exchange || 'NASDAQ'}</div>
          <h1 className="detail-title">{d.name}</h1>
          <div className="detail-sub">Action ordinaire · {currency}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div className="detail-price tnum">{prefix}{fmt(d.price)}{suffix}</div>
          <div className={`detail-chg chg ${isUp ? 'up' : 'down'}`}>
            <Icon name={isUp ? 'up' : 'down'} size={13} />
            {isUp ? '+' : ''}{fmt(d.chg)}% aujourd'hui
          </div>
        </div>
      </div>

      <div className="chart-card">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, position: 'relative' }}>
          <div className="chart-tabs">
            {ranges.map(r => (
              <div key={r} className={`chart-tab ${range === r ? 'active' : ''}`} onClick={() => setRange(r)}>
                {r}
              </div>
            ))}
          </div>
          <span className={`badge ${d.signal}`}>Signal IA : {signalLabel(d.signal)}</span>
        </div>
        <div style={{ width: '100%', height: 280, position: 'relative' }}>
          {chartData && chartData.length > 0 ? (
            <Sparkline data={chartData} color={color} width={1140} height={280} fill strokeWidth={1.75} />
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'var(--fg-4)' }}>
              Aucune donnée pour cette période
            </div>
          )}
        </div>
      </div>

      <div className="stats-grid">
        {statsData.map(s => (
          <div key={s.label} className="stat">
            <div className="stat-label">{s.label}</div>
            <div className="stat-val">{s.val}</div>
          </div>
        ))}
      </div>

      <div className="cta-bar">
        <div className="cta-text">
          Signal IA recommandé : <strong>{signalLabel(d.signal)}</strong>
          <span className="muted">· Basé sur plusieurs indicateurs croisés</span>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn" onClick={() => alert('Action ajoutée à la watchlist !')}>
            Ajouter à la watchlist
          </button>
          <button className="btn accent" onClick={() => alert('Ordre exécuté !')}>
            Exécuter l'ordre
          </button>
        </div>
      </div>
    </>
  );
}

// CONFIG SCREEN
// ═══════════════════════════════════════════════════════════════

function ConfigScreen({ onBack, botActive, setBotActive }) {
  const [capital, setCapital] = useState(10000);
  const [risk, setRisk] = useState(2);
  const [maxPos, setMaxPos] = useState(5);
  const [strategy, setStrategy] = useState('Équilibrée');
  const [autoBuy, setAutoBuy] = useState(true);
  const [autoSell, setAutoSell] = useState(true);
  const [notifications, setNotifications] = useState(true);
  const [minScore, setMinScore] = useState(65);
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    apiFetch('/api/config')
      .then(cfg => {
        setCapital(cfg.capital || 10000);
        setRisk(cfg.risk || 2);
        setMaxPos(cfg.max_positions || 5);
        setStrategy(cfg.strategy_label || 'Équilibrée');
        setMinScore(cfg.min_score || 65);
        setAutoBuy(cfg.auto_buy !== false);
        setAutoSell(cfg.auto_sell !== false);
        setNotifications(cfg.notifications !== false);
      })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, []);

  const handleSave = async () => {
    try {
      await apiFetch('/api/config', {
        method: 'POST',
        body: JSON.stringify({ capital, strategy, max_positions: maxPos, min_score: minScore, auto_buy: autoBuy, auto_sell: autoSell, notifications }),
      });
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch (e) { alert('Erreur: ' + e.message); }
  };

  const handleBotToggle = async () => {
    try {
      if (botActive) {
        await apiFetch('/api/bot/stop', { method: 'POST' });
        setBotActive(false);
      } else {
        await apiFetch('/api/bot/start', { method: 'POST' });
        setBotActive(true);
      }
    } catch (e) { alert('Erreur: ' + e.message); }
  };

  if (loading) {
    return (
      <>
        <div className="back-btn" onClick={onBack}>
          <Icon name="arrow-left" size={16} /> Retour à l'analyse
        </div>
        <div style={{ padding: '40px 0' }}>
          <div className="shimmer" style={{ width: '30%', height: 32, marginBottom: 20 }} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            {[1,2,3,4].map(i => (
              <div key={i} className="shimmer" style={{ height: 200, borderRadius: 18 }} />
            ))}
          </div>
        </div>
      </>
    );
  }

  if (error) {
    return (
      <>
        <div className="back-btn" onClick={onBack}>
          <Icon name="arrow-left" size={16} /> Retour à l'analyse
        </div>
        <div className="empty-state">
          <h3>Erreur de chargement</h3>
          <p>{error}</p>
        </div>
      </>
    );
  }

  return (
    <>
      <div className="back-btn" onClick={onBack}>
        <Icon name="arrow-left" size={16} />
        Retour à l'analyse
      </div>

      <div className="detail-head">
        <div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Paramètres</div>
          <h1 className="detail-title">Configuration du bot</h1>
          <div className="detail-sub">Ajustez les règles d'exécution et le profil de risque</div>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button className="btn" onClick={handleSave}>
            {saved ? '✓ Enregistré' : 'Enregistrer'}
          </button>
          <button className={`btn ${botActive ? 'primary' : 'accent'}`} onClick={handleBotToggle}>
            <Icon name={botActive ? 'stop' : 'play'} size={13} />
            {botActive ? 'Arrêter le bot' : 'Activer le bot'}
          </button>
        </div>
      </div>

      <div className="config-grid">
        <div className="config-card">
          <h3>Capital & risque</h3>
          <div className="sub">Définit la taille des positions prises par le bot.</div>
          <div className="field">
            <div>
              <div className="field-label">Capital alloué</div>
              <div className="field-hint">Montant maximum engagé</div>
            </div>
            <div className="slider-row" style={{ width: 200 }}>
              <input type="range" min="1000" max="100000" step="500" value={capital} onChange={e => setCapital(+e.target.value)} />
              <span className="val tnum">${fmt(capital, 0)}</span>
            </div>
          </div>
          <div className="field">
            <div>
              <div className="field-label">Risque par trade</div>
              <div className="field-hint">% du capital exposé</div>
            </div>
            <div className="slider-row" style={{ width: 200 }}>
              <input type="range" min="0.5" max="10" step="0.5" value={risk} onChange={e => setRisk(+e.target.value)} />
              <span className="val tnum">{risk}%</span>
            </div>
          </div>
          <div className="field">
            <div>
              <div className="field-label">Positions simultanées</div>
              <div className="field-hint">Nombre maximum ouvert</div>
            </div>
            <div className="slider-row" style={{ width: 200 }}>
              <input type="range" min="1" max="20" step="1" value={maxPos} onChange={e => setMaxPos(+e.target.value)} />
              <span className="val tnum">{maxPos}</span>
            </div>
          </div>
        </div>

        <div className="config-card">
          <h3>Stratégie</h3>
          <div className="sub">Comportement général du moteur d'analyse.</div>
          <div className="field">
            <div>
              <div className="field-label">Profil</div>
              <div className="field-hint">Influence l'agressivité du bot</div>
            </div>
            <div className="segmented">
              {['Prudente', 'Équilibrée', 'Agressive'].map(s => (
                <div key={s} className={`seg ${strategy === s ? 'active' : ''}`} onClick={() => setStrategy(s)}>{s}</div>
              ))}
            </div>
          </div>
          <div className="field">
            <div>
              <div className="field-label">Score minimum pour trader</div>
              <div className="field-hint">En dessous, le bot reste en veille</div>
            </div>
            <div className="slider-row" style={{ width: 200 }}>
              <input type="range" min="30" max="95" step="5" value={minScore} onChange={e => setMinScore(+e.target.value)} />
              <span className="val tnum">{minScore}</span>
            </div>
          </div>
        </div>

        <div className="config-card">
          <h3>Automatisation</h3>
          <div className="sub">Actions que le bot peut exécuter seul.</div>
          <div className="field">
            <div>
              <div className="field-label">Achats automatiques</div>
              <div className="field-hint">Exécute les signaux « Acheter »</div>
            </div>
            <div className={`toggle ${autoBuy ? 'on' : ''}`} onClick={() => setAutoBuy(!autoBuy)} />
          </div>
          <div className="field">
            <div>
              <div className="field-label">Ventes automatiques</div>
              <div className="field-hint">Exécute les signaux « Vendre »</div>
            </div>
            <div className={`toggle ${autoSell ? 'on' : ''}`} onClick={() => setAutoSell(!autoSell)} />
          </div>
          <div className="field">
            <div>
              <div className="field-label">Notifications push</div>
              <div className="field-hint">Alerte à chaque signal</div>
            </div>
            <div className={`toggle ${notifications ? 'on' : ''}`} onClick={() => setNotifications(!notifications)} />
          </div>
        </div>

        <div className="config-card">
          <h3>Résumé</h3>
          <div className="sub">Aperçu de la configuration actuelle.</div>
          <div className="field">
            <div className="field-label">Capital engagé</div>
            <div className="tnum" style={{ color: 'var(--fg)', fontWeight: 500 }}>${fmt(capital, 0)}</div>
          </div>
          <div className="field">
            <div className="field-label">Risque par position</div>
            <div className="tnum" style={{ color: 'var(--fg)', fontWeight: 500 }}>${fmt(capital * risk / 100, 0)}</div>
          </div>
          <div className="field">
            <div className="field-label">Profil</div>
            <div style={{ color: 'var(--fg)', fontWeight: 500 }}>{strategy}</div>
          </div>
          <div className="field">
            <div className="field-label">Seuil d'entrée</div>
            <div className="tnum" style={{ color: 'var(--fg)', fontWeight: 500 }}>Score ≥ {minScore}</div>
          </div>
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [theme, setTheme] = useState(() => {
    return localStorage.getItem('tradeflow-theme') || 'dark';
  });
  const [screen, setScreen] = useState('home');
  const [activeStock, setActiveStock] = useState(null);
  const [botActive, setBotActive] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('tradeflow-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('data-density', 'compact');
  }, []);

  useEffect(() => {
    const check = () => {
      apiFetch('/api/bot/status')
        .then(s => setBotActive(s.active))
        .catch(() => {});
    };
    check();
    const t = setInterval(check, 30000);
    return () => clearInterval(t);
  }, []);

  const openStock = (s) => { setActiveStock(s); setScreen('detail'); window.scrollTo(0, 0); };
  const openConfig = () => { setScreen('config'); window.scrollTo(0, 0); };
  const goHome = () => { setScreen('home'); };

  return (
    <div className="app">
      <nav className="nav">
        <div className="logo" onClick={goHome}>
          <span className="logo-mark"></span>
          TradeFlow
        </div>
        <div className="nav-links">
          <span className={`nav-link ${screen === 'home' ? 'active' : ''}`} onClick={goHome}>Marchés</span>
          <span className={`nav-link ${screen === 'detail' ? 'active' : ''}`} onClick={() => activeStock && setScreen('detail')}>Analyse</span>
          <span className={`nav-link ${screen === 'config' ? 'active' : ''}`} onClick={openConfig}>Bot</span>
        </div>
        <div className="nav-spacer" />
        {botActive && (
          <span className="status-pill" style={{ color: COLOR_UP }}>
            <span className="status-dot" /> Bot actif
          </span>
        )}
        <ThemeToggle theme={theme} setTheme={setTheme} />
      </nav>

      {screen === 'home' && (
        <HomeScreen
          onOpenStock={openStock}
          onOpenConfig={openConfig}
          botActive={botActive}
          setBotActive={setBotActive}
        />
      )}
      {screen === 'detail' && activeStock && (
        <DetailScreen stock={activeStock} onBack={goHome} />
      )}
      {screen === 'config' && (
        <ConfigScreen onBack={goHome} botActive={botActive} setBotActive={setBotActive} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
