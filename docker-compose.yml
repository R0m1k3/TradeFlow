services:

  # ── WebUI — Streamlit dashboard ─────────────────────────────────────────────
  tradeflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradeflow_app
    ports:
      - "8501:8501"
    volumes:
      - tradeflow_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped
    networks:
      - nginx_default
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Bot — Live trading loop ──────────────────────────────────────────────────
  # Runs independently, shares the same SQLite DB via the named volume.
  # Start a live session from the WebUI → this service picks it up immediately.
  #
  # BOT_TICK_SECONDS controls how often the bot checks for new signals:
  #   3600  = every hour  (good for 1h bars)
  #   900   = every 15min (good for 15m bars)
  #   60    = every minute (good for testing / 1d bars with fast feedback)
  tradeflow_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradeflow_bot
    command: python app/bot/run_bot.py
    volumes:
      - tradeflow_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      # Bot version: v1 (legacy) or v2 (regime + risk + meta-label, recommended)
      - BOT_VERSION=v2
      - BOT_TICK_SECONDS=3600
      - BOT_COMMISSION=0.001
      - BOT_SLIPPAGE=0.0005
      # v2 settings
      - BOT_UNIVERSE=AAPL,MSFT,GOOG,AMZN,META,NVDA,SPY
      - BOT_BENCHMARK=SPY
      - BOT_STRATEGY=pullback_trend
      - BOT_INITIAL_CAPITAL=10000
      - BOT_INTERVAL=1d
      - BOT_DATA_PERIOD=1y
      - BOT_META_LABELER_PATH=data/meta_labeler.pkl
      # v1 legacy (only if BOT_VERSION=v1)
      - BOT_POSITION_SIZE=0.95
    restart: unless-stopped
    depends_on:
      - tradeflow

networks:
  nginx_default:
    external: true

volumes:
  tradeflow_data:
