# TradeFlow — Global Configuration
# All monetary values are in EUR/USD (depends on asset market)

default_capital: 10000
algo_capital: 10000          # Capital dédié à l'algorithme traditionnel
aria_capital: 10000          # Capital dédié à l'agent ARIA autonome

default_symbols:
  - AAPL       # Apple (NASDAQ)
  - TSLA       # Tesla (NASDAQ)
  - MC.PA      # LVMH (Euronext Paris)
  - TTE.PA     # TotalEnergies (Euronext Paris)
  - MSFT       # Microsoft (NASDAQ)
  - AMZN       # Amazon (NASDAQ)

default_interval: "1h"   # Supported: 1m, 5m, 15m, 30m, 1h, 1d
default_period: "3mo"    # yfinance period: 1d, 5d, 1mo, 3mo, 6mo, 1y, 2y, 5y

broker:
  commission: 0.001      # 0.1% per trade
  slippage: 0.0005       # 0.05% simulated spread

strategies:
  sma_crossover:
    fast_period: 20
    slow_period: 50
  rsi:
    period: 14
    oversold: 30
    overbought: 70
  macd:
    fast: 12
    slow: 26
    signal: 9

database:
  path: "data/tradeflow.db"

indicators:
  sma_windows: [20, 50, 200]
  bollinger_window: 20
  bollinger_std: 2

# ── AI Analysis (OpenRouter) ───────────────────────────────────────────────────
# API key is stored in .env as OPENROUTER_API_KEY (never here)
ai_analysis:
  enabled: false
  mode: "hybrid"                # hybrid = AI score feeds the algo | autonomous = AI decides alone
  model: "perplexity/sonar"
  interval_seconds: 1800        # 30 minutes
  score_weight: 0.3             # 0 = ignore AI, 1 = AI only (hybrid mode only)
  timeout_seconds: 30
  score_ttl_seconds: 3600       # score expires after 1h if scheduler stops

# ── Live Trading Bot ───────────────────────────────────────────────────────────
# Configure the continuous bot here. Start/stop from the WebUI.
live_trading:
  strategy: "composite"              # composite | sma_crossover | rsi | macd
  symbols:
    - AAPL
    - TSLA
    - NVDA
  interval: "1h"
  initial_capital: 10000
  position_size: 0.95
  # Tick interval is set via BOT_TICK_SECONDS env var in docker-compose.yml
